  edi:
    title: Equity, Diversity, Inclusion + Indigeneity
    text: 'The HCT lab is committed to truth and reconciliation, inclusive leadership and advancing diversity in all aspects of the lab environment including research opportunities, collaboration, intellectual advancement and equitable access to funding opportunities, and inclusive and diverse research teams. In addition to UBC''s EDII initiatives, HCT recognizes that EDII policies and practices strengthen the research community, as well as the quality, social relevance, outcomes, and impacts of research.


      See the Faculty of Applied Science [EDI.I](https://apsc.ubc.ca/EDI.I) website to learn more about these EDII commitments, to find related EDII resources, and how to support EDII initiatives in the Applied Science community. Also, see the Government of Canada''s [Dimensions](http://www.nserc-crsng.gc.ca/NSERC-CRSNG/EDI-EDI/Dimensions-Charter_Dimensions-Charte_eng.asp) charter as it is our guiding charter and seeks to increase EDI within Canada''s post-secondary institutions and the university research ecosystem.'
