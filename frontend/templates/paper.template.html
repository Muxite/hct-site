<!DOCTYPE html>
<!--
  HCT Lab — per-paper page template (handoff for the frontend owner).

  Each publication gets its own page, addressed by slug: paper.html?slug=<slug>
  (or a static /publications/<slug>.html if pre-rendered). Fetch the single
  `publications` row by slug from Supabase and fill the placeholders. The
  `description` is the AI-written, source-grounded short summary
  (`hct-manager describe --fetch`); show it as the page's lead paragraph.
-->
<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>{{publications.title}} — HCT Lab</title>
    <link rel="stylesheet" href="./assets/global.css">
    <link rel="stylesheet" href="./assets/tiles.css">
    <link rel="stylesheet" href="./assets/mobile.css">
    <link href="./assets/css2" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body>
    <main>
      <header>
        <a href="index.html#publications">← All publications</a>
      </header>
      <hr>

      <article class="paper">
        <h1 class="title">{{publications.title}}</h1>
        <div class="authors">{{publications.authors_joined}}</div>
        <div class="venue" style="color: #888">
          {{publications.venue}}, {{publications.year}}. [{{publications.type}}]
        </div>

        <!-- AI-written, source-grounded summary (shortened from the paper). -->
        <p class="description">{{publications.description}}</p>

        <div class="links" style="font-size: 0.9em">
          <a href="{{publications.link}}">Read the paper</a>
          <!-- bibtex if present: <pre class="bibtex">{{publications.bibtex}}</pre> -->
        </div>
      </article>
    </main>
  </body>
</html>
